workflows:
  android-release:
    name: ByteBeam Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - akashchanda27@gmail.com
        notify:
          success: true
          failure: true
